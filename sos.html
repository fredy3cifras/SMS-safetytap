<!DOCTYPE html>
<html>
<head>
  <title>SafetyTap SOS</title>
</head>

<body>
<h2>Sending SOS...</h2>

<script>

// 🔒 Número dividido (más difícil de leer por bots)
const part1 = "1347";
const part2 = "470";
const part3 = "7382";
const phone = "+" + part1 + part2 + part3;

navigator.geolocation.getCurrentPosition(
  function(position) {

    // 1. Obtener coordenadas
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    // 2. Link de ubicación
    const location = "https://maps.google.com/?q=" + lat + "," + lon;

    // 3. Mensaje
    const message = "SafetyTap Alert: I need help. My location: " + location;

    // 4. Crear link SMS (compatible iPhone + Android)
    const sms = "sms:" + phone + "?body=" + encodeURIComponent(message);

    // 5. Redirigir automáticamente
    window.location.href = sms;
  },

  function(error) {
    // ⚠️ Si el usuario rechaza ubicación
    const fallbackMessage = "SafetyTap Alert: I need help but location unavailable.";
    const sms = "sms:" + phone + "?body=" + encodeURIComponent(fallbackMessage);

    window.location.href = sms;
  }
);

</script>

</body>
</html>
